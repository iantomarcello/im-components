<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>im-components</title>
    <link rel="stylesheet" href="./src/index.css" />
    <script type="module" src="/src/index.ts"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
    <style>
      .form {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;

        * {
          grid-column: span 12;
        }
      }

      .summary {
        font-size: 1.5rem;
        margin-block-end: 16px;
      }
      
    </style>
  </head>
  <body class="bg-slate-900 text-white">

    <div class="container min-h-screen mx-auto grid place-content-center gap-12">
      <h1 class="text-3xl text-center font-semibold uppercase tracking-wider">Component testing ground</h1>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-12">
        <details open>
          <summary class="summary">Input text</summary>
          <form class="form">
            <p class="text-lg font-bold">Commons</p>
            <im-input
              label="This is a plain label"
              name="plain label"
              placeholder="The placeholder works"
            ></im-input>
            <im-input
              label="I am disabled"
              name="disabled"
              placeholder="Oh noes, cannot enter value!"
              disabled
            ></im-input>
            <im-input
              label="I am readonly!"
              name="disabled"
              value="Please read"
              readonly
            ></im-input>
            <im-input
              name="custom_label"
              placeholder="This field has custom label"
              class="[&::part(label)]:text-blue-400 [&::part(input)]:bg-blue-300"
            >
              <span slot="label"
                >I am a custom label, styled with Tailwind as well</span
              >
            </im-input>
  
            <p class="text-lg font-bold">Errors</p>
            <im-input name="required" required>
              <span slot="label">I need required</span>
            </im-input>
            <im-input
              label="I have max length and invalid pattern"
              name="errors"
              value="definitely not a number and longer than it should be"
              pattern="^[\d]*$"
              maxlength="4"
            ></im-input>
            <im-input
              label="I have custom required message"
              name="custom_required"
              required
              errors='{"valueMissing": "You must fill out this field!"}'
            ></im-input>
            <button type="submit">submit</button>
          </form>
        </details>
        <details open>
          <summary class="summary">Input Check box and Radios</summary>
          <form class="form">
            <im-input-checkbox name="tnc" label="Terms and Condition apply"></im-input-checkbox>
            <im-input-checkbox name="pp" required>
              <span slot="label">By agreeing to privacy policy, we can basically track you. Hehe {
              </span>
            </im-input-checkbox>
            <im-input-checkbox name="disabled" label="I am disabled" disabled></im-input-checkbox>
            <im-input-radio name="gender" label="Gender" required
              options='[
                { "value": "male", "label": "Male <small>lelaki!</small>" },
                { "value": "female", "label": "Female <small>perempuan!</small>" },
                { "value": "other", "label": "Other" }
              ]'
            ></im-input-radio>
            <button>Submit</button>
          </form>
        </details>
        <details open>
          <summary class="summary">Input range, date</summary>
          <form class="form">
            <im-input-range
              label="range input without min or max"
              name="unranged"
            ></im-input-range>
            <im-input-range
              label="range input with min 10, max 100"
              name="ranged"
              max="100"
              min="10"
              value="20"
              step="0.01"
            ></im-input-range>
            <im-input-range
              label="range input with tooltip to display current value"
              name="tooltip"
              showTooltip
            ></im-input-range>
            <button type="submit">submit</button>
          </form>
        </details>

      </div>
    </div>
    <script>
      const forms = document.querySelectorAll('form');
      forms.forEach(form => {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const formData = new FormData(form);
          console.log(Object.fromEntries(formData.entries()));
        });
      });
    </script>
  </body>
</html>
