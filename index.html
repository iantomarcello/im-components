<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>im-form-components</title>
    <link rel="stylesheet" href="./src/index.css" />
    <script type="module" src="/src/index.ts"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-900 text-white">
    <div class="container min-h-screen mx-auto grid place-items-center">
      <form id="form" class="max-w-2xl w-full grid gap-4">
        <p class="text-lg font-bold">Commons</p>
        <im-input label="This is a plain label" name="plain label" placeholder="The placeholder works"></im-input>
        <im-input name="custom_label" placeholder="This field has custom label">
          <span slot="label">I am a custom label</span>
        </im-input>

        <p class="text-lg font-bold">Errors</p>
        <im-input label="I need required" name="required" required></im-input>
        <im-input input label="I have max length and invalid pattern" name="errors"
          value="definitely not a number and longer than it should be"
          pattern="^[\d]*$"
          maxlength="4"
        ></im-input>
        <im-input input label="I have custom required message" name="custom_required"
          required
          errors='{"valueMissing": "You must fill out this field!"}'
        ></im-input>
        <button type="submit">submit</button>
      </form>
    </div>
    <script>
      const form = document.getElementById('form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        console.log(Object.fromEntries(formData.entries()));
      });
    </script>
  </body>
</html>
